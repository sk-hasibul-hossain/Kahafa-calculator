<!DOCTYPE html> 
<html> 
<head> 
 <title>Price Calculator</title> 

  <!-- Bootstrap CDN --> 
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> 

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    </head> 

    <body class="bg-light"> 

    <div class="container py-4"> 
     <div class="card shadow-sm mx-auto" style="max-width: 420px;"> 
      <div class="card-body"> 

       <h5 class="text-center mb-4">Price Calculator</h5> 

        <!-- Product Name --> 
         <div class="mb-3"> 
          <label class="form-label fw-semibold">Product Name</label> 
           <input type="text" id="productName" class="form-control"> 
            <div class="text-danger small" id="nameError"></div> 
             </div> 

              <!-- Product Price --> 
               <div class="mb-3"> 
                <label class="form-label fw-semibold">Product Price</label> 
                 <input type="number" id="productPrice" class="form-control" value="0"> 
                  <div class="text-danger small" id="priceError"></div> 
                   </div> 

                    <!-- Delivery --> 
                     <div class="mb-3"> 
                      <label class="form-label fw-semibold">Delivery Cost</label> 
                       <input type="number" id="deliveryCost" class="form-control" value="50"> 
                        <div class="text-danger small" id="deliveryError"></div> 
                         </div> 

                          <!-- GST --> 
                           <div class="mb-3"> 
                            <label class="form-label fw-semibold">GST (%)</label> 
                             <input type="number" id="gst" class="form-control" value="18"> 
                              <div class="text-danger small" id="gstError"></div> 
                               </div> 

                                <!-- Platform --> 
                                 <div class="mb-3"> 
                                  <label class="form-label fw-semibold">Platform Charges</label> 
                                   <input type="number" id="platformCharges" class="form-control" value="20"> 
                                    <div class="text-danger small" id="platformError"></div> 
                                     </div> 

                                      <!-- Buttons --> 
                                       <div class="d-flex gap-2"> 
                                        <button onclick="calculate()" class="btn btn-primary w-100"> 
                                         Calculate 
                                          </button> 
                                           <button onclick="resetForm()" class="btn btn-outline-secondary w-100"> 
                                            Reset 
                                             </button> 
                                              </div> 

                                               <!-- Breakdown --> 
                                                <div class="mt-4"> 
                                                 <div class="d-flex justify-content-between bg-light p-2 rounded mb-2"> 
                                                  <span>Price</span> 
                                                   <span>₹ <span id="priceDisplay">0</span></span> 
                                                    </div> 

                                                     <div class="d-flex justify-content-between bg-light p-2 rounded mb-2"> 
                                                      <span>GST Amount</span> 
                                                       <span>₹ <span id="gstAmount">0</span></span> 
                                                        </div> 

                                                         <div class="d-flex justify-content-between bg-light p-2 rounded mb-2"> 
                                                          <span>Delivery</span> 
                                                           <span>₹ <span id="deliveryDisplay">0</span></span> 
                                                            </div> 

                                                             <div class="d-flex justify-content-between bg-light p-2 rounded mb-2"> 
                                                              <span>Platform Charges</span> 
                                                               <span>₹ <span id="platformDisplay">0</span></span> 
                                                                </div> 
                                                                 </div> 

                                                                  <!-- Total --> 
                                                                   <div class="d-flex justify-content-between bg-success text-white p-3 rounded mt-3 fw-bold"> 
                                                                    <span>Total</span> 
                                                                     <span>₹ <span id="total">0</span></span> 
                                                                      </div> 

                                                                       </div> 
                                                                        </div> 
                                                                        </div> 

                                                                        <script> 
                                                                        function clearErrors() { 
                                                                         document.querySelectorAll(".text-danger").forEach(el => el.innerText = ""); 
                                                                         } 

                                                                         function calculate() { 
                                                                          clearErrors(); 

                                                                           const name = document.getElementById("productName").value.trim(); 
                                                                            const price = parseFloat(document.getElementById("productPrice").value); 
                                                                             const delivery = parseFloat(document.getElementById("deliveryCost").value); 
                                                                              const gst = parseFloat(document.getElementById("gst").value); 
                                                                               const platform = parseFloat(document.getElementById("platformCharges").value); 

                                                                                let isValid = true; 

                                                                                 // Product name validation 
                                                                                  if (!name) { 
                                                                                   document.getElementById("nameError").innerText = "Product name is required"; 
                                                                                    isValid = false; 
                                                                                     } 

                                                                                      // ✅ Updated Product Price validation 
                                                                                       if (isNaN(price) || price <= 0) { 
                                                                                        document.getElementById("priceError").innerText = "Product price must be greater than 0"; 
                                                                                         isValid = false; 
                                                                                          } 

                                                                                           if (isNaN(delivery) || delivery < 0) { 
                                                                                            document.getElementById("deliveryError").innerText = "Enter valid delivery cost"; 
                                                                                             isValid = false; 
                                                                                              } 

                                                                                               if (isNaN(gst) || gst < 0) { 
                                                                                                document.getElementById("gstError").innerText = "Enter valid GST %"; 
                                                                                                 isValid = false; 
                                                                                                  } 

                                                                                                   if (isNaN(platform) || platform < 0) { 
                                                                                                    document.getElementById("platformError").innerText = "Enter valid platform charges"; 
                                                                                                     isValid = false; 
                                                                                                      } 

                                                                                                       if (!isValid) return; 

                                                                                                        const gstAmount = (price * gst) / 100; 
                                                                                                         const total = price + gstAmount + delivery + platform; 

                                                                                                          document.getElementById("priceDisplay").innerText = price.toFixed(2); 
                                                                                                           document.getElementById("gstAmount").innerText = gstAmount.toFixed(2); 
                                                                                                            document.getElementById("deliveryDisplay").innerText = delivery.toFixed(2); 
                                                                                                             document.getElementById("platformDisplay").innerText = platform.toFixed(2); 
                                                                                                              document.getElementById("total").innerText = total.toFixed(2); 
                                                                                                              } 

                                                                                                              function resetForm() { 
                                                                                                               document.getElementById("productName").value = ""; 
                                                                                                                document.getElementById("productPrice").value = 0; 
                                                                                                                 document.getElementById("deliveryCost").value = 50; 
                                                                                                                  document.getElementById("gst").value = 18; 
                                                                                                                   document.getElementById("platformCharges").value = 20; 

                                                                                                                    clearErrors(); 

                                                                                                                     document.getElementById("priceDisplay").innerText = "0"; 
                                                                                                                      document.getElementById("gstAmount").innerText = "0"; 
                                                                                                                       document.getElementById("deliveryDisplay").innerText = "0"; 
                                                                                                                        document.getElementById("platformDisplay").innerText = "0"; 
                                                                                                                         document.getElementById("total").innerText = "0"; 
                                                                                                                         } 
                                                                                                                         </script> 

                                                                                                                         </body> 
                                                                                                                         </html>
